name: Development Build

# Publishes a rolling, unsigned prerelease from dev without changing the
# production version or the stable release workflow on main.
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true

jobs:
  check:
    name: Verify dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Build dev (${{ matrix.label }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact: dev-windows
            glob: release/*.exe
          - os: macos-latest
            label: macOS
            artifact: dev-macos
            glob: release/*.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm build && pnpm exec electron-builder --publish never
        env:
          # Development installers are intentionally unsigned for now.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Update development prerelease
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: dev-windows
          path: artifacts/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: dev-macos
          path: artifacts/macos

      - name: Point rolling dev tag at this build
        shell: bash
        run: |
          git tag --force dev-latest "$GITHUB_SHA"
          git push origin refs/tags/dev-latest --force

      - name: Publish rolling development release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Nimruz Development Build #${{ github.run_number }}"
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: |
            Automated development build from the `dev` branch.

            - Commit: `${{ github.sha }}`
            - Workflow run: `${{ github.run_number }}`
            - These installers are unsigned and intended for testing beta features.
            - The public version in `package.json` is unchanged.
          files: |
            artifacts/windows/*
            artifacts/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
